# 生产部署用：拉取 CI 构建的镜像，不在服务器上 build
# 镜像名由 deploy workflow 注入
services:
  client:
    image: ${IMAGE_CLIENT}
    container_name: llm-chat-client
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - llm-chat
    depends_on:
      - server
    restart: unless-stopped

  server:
    image: ${IMAGE_SERVER}
    container_name: llm-chat-server
    env_file: .env
    environment:
      - MONGODB_URL=mongodb://mongo:27017/llm-chat
      - REDIS_URL=redis://redis:6379
    volumes:
      - llm-chat-uploads:/app/uploads
    networks:
      - llm-chat
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=64M

  mongo:
    image: mongo:7
    container_name: llm-chat-mongo
    volumes:
      - llm-chat-mongo:/data/db
    networks:
      - llm-chat
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: llm-chat-redis
    networks:
      - llm-chat
    restart: unless-stopped

networks:
  llm-chat:
    driver: bridge

volumes:
  llm-chat-uploads:
  llm-chat-mongo:
