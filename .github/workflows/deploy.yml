name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: meta
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REPO=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          echo "client=ghcr.io/${OWNER}/${REPO}-client:latest" >> $GITHUB_OUTPUT
          echo "server=ghcr.io/${OWNER}/${REPO}-server:latest" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta.outputs.client }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.server }}

      - name: Deploy via SSH
        env:
          COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
          COZE_BOT_ID: ${{ secrets.COZE_BOT_ID }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          APP_PORT: ${{ secrets.APP_PORT }}
          IMAGE_CLIENT: ${{ steps.meta.outputs.client }}
          IMAGE_SERVER: ${{ steps.meta.outputs.server }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: COZE_API_TOKEN,COZE_BOT_ID,CORS_ORIGIN,APP_PORT,IMAGE_CLIENT,IMAGE_SERVER
          script: |
            mkdir -p $HOME/llm-chat && cd $HOME/llm-chat

            cat > .env << EOF
            COZE_API_TOKEN=$COZE_API_TOKEN
            COZE_BOT_ID=$COZE_BOT_ID
            CORS_ORIGIN=$${CORS_ORIGIN:-http://localhost}
            APP_PORT=$${APP_PORT:-80}
            EOF

            curl -sfL -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.prod.yml

            export IMAGE_CLIENT IMAGE_SERVER
            docker compose pull
            docker compose up -d
